<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Närimiskumm</title>
    <style>

        a{color: black;
        text-decoration: none;}
        h1{text-align: center;}
        

    </style>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script>
        /*alert("Tere, maailm!");*/

        window.onload = function() {
            let algne = document.getElementById("klikid");
            algne.innerHTML = localStorage.getItem("Cooki");
        }
        function kaunter(){
            let algne = document.getElementById("klikid");
            let tulemus = Number(algne.innerHTML) + 1;
            algne.innerHTML = tulemus;

            localStorage.setItem("Cooki", tulemus);
        }
        let autoClickOn = false;
let interval = null;


// Salvesta hiire asukoht
document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// Auto-click funktsioon
function autoClick() {
  const el = document.elementFromPoint(mouseX, mouseY);
  if (el) el.click();
}

// F6 toggle
document.addEventListener("keydown", (e) => {
  if (e.code === "F6") {
    autoClickOn = !autoClickOn;

    if (autoClickOn) {
      interval = setInterval(autoClick, 1);
      console.log("Auto-click ON");
    } else {
      clearInterval(interval);
      console.log("Auto-click OFF");
    }
  }
});
    </script>
</head>

<img style="width: 500px;;" src="images/Näts.jpg" alt="Pilt nätsutest" onclick="kaunter()">
